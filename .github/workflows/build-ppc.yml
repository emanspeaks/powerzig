name: Build Zig for PowerPC 32-bit

# Builds the latest Zig from the zig-bootstrap main branch on Codeberg.
# zig-bootstrap handles fetching the Zig source and LLVM internally.
# The resulting glibc-linked binary targets powerpc-linux-gnu (iBook G3 / 750fx).
#
# First run: 2–4 hours (LLVM compilation).
# Subsequent runs where the Zig version hasn't changed: ~30 min (LLVM cached).

on:
  schedule:
    - cron: '0 2 * * 0'   # Every Sunday at 02:00 UTC
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Rebuild and overwrite even if a release already exists'
        type: boolean
        required: false
        default: false

# Required to create/delete releases and their git tags.
permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Clone zig-bootstrap, detect the Zig version it will build, and decide
  # whether a release for that version already exists.
  # ─────────────────────────────────────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      zig_version:  ${{ steps.version.outputs.zig_version }}
      should_build: ${{ steps.gate.outputs.should_build }}
    steps:
      - name: Clone zig-bootstrap (main) from Codeberg
        run: |
          git clone --depth 1 https://codeberg.org/ziglang/zig-bootstrap.git bootstrap
          echo "Cloned at commit: $(git -C bootstrap rev-parse --short HEAD)"

      - name: Detect Zig version from zig-bootstrap source
        id: version
        run: |
          cd bootstrap
          # zig-bootstrap stores the target Zig version in a file or the build script.
          if [[ -f zig-version ]]; then
            V=$(tr -d '[:space:]' < zig-version)
          elif grep -q 'ZIG_VERSION' build 2>/dev/null; then
            V=$(grep -m1 'ZIG_VERSION' build | grep -oE '[0-9]+\.[0-9]+\.[0-9]+[^"'\''[:space:]]*')
          else
            # Fallback: date + short hash so the release tag is still unique.
            V="nightly-$(git log -1 --format='%cd' --date=format:'%Y%m%d')-$(git rev-parse --short HEAD)"
          fi
          echo "zig_version=$V" >> "$GITHUB_OUTPUT"
          echo "Detected Zig version: $V"

      - name: Check for an existing release
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="zig-${{ steps.version.outputs.zig_version }}-powerpc32"
          if [[ "${{ inputs.force_rebuild }}" == "true" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Force-rebuild requested — will build regardless."
          elif gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists — skipping build."
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "No release found for $TAG — will build."
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Cross-compile LLVM + Zig for powerpc-linux-gnu using zig-bootstrap.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6-hour hard cap (LLVM build can be long)

    env:
      ZIG_VERSION: ${{ needs.prepare.outputs.zig_version }}
      # Target triple: 32-bit big-endian PowerPC, glibc (matches PowerArch Linux).
      ZIG_TARGET:  powerpc-linux-gnu
      # CPU baseline is safe for any 32-bit PPC including the 750fx (G3).
      # The 750fx has no AltiVec, so we must not use a cpu that enables it.
      ZIG_CPU:     baseline

    steps:
      # Free runners ship with a lot of pre-installed toolchains we don't need.
      # Reclaiming ~15 GB prevents out-of-disk failures during the LLVM build.
      - name: Free up runner disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /usr/local/.ghcup \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost
          sudo apt-get autoremove -y -qq
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get install -y -qq cmake ninja-build xz-utils python3

      - name: Clone zig-bootstrap (main) from Codeberg
        run: |
          git clone --depth 1 https://codeberg.org/ziglang/zig-bootstrap.git bootstrap
          echo "Cloned at commit: $(git -C bootstrap rev-parse --short HEAD)"

      # Cache the compiled LLVM output across workflow runs.
      # On a cache hit the build script skips the multi-hour LLVM compilation.
      - name: Restore cached LLVM output
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: bootstrap/out
          key: llvm-${{ env.ZIG_VERSION }}-${{ env.ZIG_TARGET }}-${{ env.ZIG_CPU }}-v1

      - name: Build LLVM + Zig for PowerPC 32-bit
        run: |
          cd bootstrap
          echo "=== Building Zig $ZIG_VERSION for $ZIG_TARGET (cpu=$ZIG_CPU) ==="
          if [[ "${{ steps.cache-llvm.outputs.cache-hit }}" == "true" ]]; then
            echo "LLVM cache hit — skipping LLVM compilation."
          else
            echo "No LLVM cache — this will take 2–4 hours."
          fi
          ./build "$ZIG_TARGET" "$ZIG_CPU"

      - name: Verify build output
        run: |
          OUT_DIR="bootstrap/out/zig-$ZIG_TARGET-$ZIG_CPU"
          if [[ ! -f "$OUT_DIR/bin/zig" ]]; then
            echo "ERROR: expected zig binary not found at $OUT_DIR/bin/zig"
            echo "Contents of bootstrap/out:"
            find bootstrap/out -maxdepth 3 | sort
            exit 1
          fi
          echo "Build successful!"
          file "$OUT_DIR/bin/zig"
          ls -lah "$OUT_DIR/bin/zig"

      - name: Package release archive
        run: |
          SRC="bootstrap/out/zig-$ZIG_TARGET-$ZIG_CPU"
          DEST="zig-$ZIG_VERSION-powerpc"
          ARCHIVE="zig-linux-powerpc-$ZIG_VERSION.tar.xz"

          cp -r "$SRC" "$DEST"
          tar cJf "$ARCHIVE" "$DEST/"

          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          ls -lah "$ARCHIVE"

      # --cleanup-tag removes both the release and its git tag in one call;
      # no local checkout or git credentials required.
      - name: Delete existing release (force-rebuild only)
        if: inputs.force_rebuild == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="zig-${ZIG_VERSION}-powerpc32"
          gh release delete "$TAG" \
            --repo "${{ github.repository }}" \
            --cleanup-tag \
            --yes 2>/dev/null || true

      # Write release notes line-by-line to avoid heredoc/YAML indentation conflicts.
      - name: Write release notes
        run: |
          TAG="zig-${ZIG_VERSION}-powerpc32"
          REPO="${{ github.repository }}"
          NOTE=/tmp/release-notes.md
          echo "## Zig ${ZIG_VERSION} for PowerPC 32-bit"                                                          > "$NOTE"
          echo ""                                                                                                   >> "$NOTE"
          echo "Cross-compiled Zig targeting \`${ZIG_TARGET}\`, for the iBook G3 Snow Clamshell (750fx CPU)."     >> "$NOTE"
          echo ""                                                                                                   >> "$NOTE"
          echo "### Download and install on iBook G3"                                                              >> "$NOTE"
          echo ""                                                                                                   >> "$NOTE"
          echo '```bash'                                                                                            >> "$NOTE"
          echo "wget https://github.com/${REPO}/releases/download/${TAG}/zig-linux-powerpc-${ZIG_VERSION}.tar.xz" >> "$NOTE"
          echo "tar xf zig-linux-powerpc-${ZIG_VERSION}.tar.xz"                                                   >> "$NOTE"
          echo "export PATH=\"\$PWD/zig-${ZIG_VERSION}-powerpc/bin:\$PATH\""                                      >> "$NOTE"
          echo "zig version"                                                                                        >> "$NOTE"
          echo '```'                                                                                                >> "$NOTE"
          echo ""                                                                                                   >> "$NOTE"
          echo "To make the PATH permanent, add the export line to your \`~/.bashrc\` or \`~/.profile\`."         >> "$NOTE"
          echo ""                                                                                                   >> "$NOTE"
          echo "### Build details"                                                                                  >> "$NOTE"
          echo ""                                                                                                   >> "$NOTE"
          echo "| Field | Value |"                                                                                  >> "$NOTE"
          echo "|---|---|"                                                                                          >> "$NOTE"
          echo "| Zig version | \`${ZIG_VERSION}\` |"                                                             >> "$NOTE"
          echo "| Target triple | \`${ZIG_TARGET}\` |"                                                            >> "$NOTE"
          echo "| CPU | \`${ZIG_CPU}\` (safe for 750fx — no AltiVec) |"                                          >> "$NOTE"
          echo "| libc | glibc (dynamically linked, matches PowerArch Linux) |"                                    >> "$NOTE"
          echo "| Built with | [zig-bootstrap](https://codeberg.org/ziglang/zig-bootstrap) on GitHub Actions |"   >> "$NOTE"
          echo "| Runner | ubuntu-latest (x86_64) |"                                                               >> "$NOTE"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="zig-${ZIG_VERSION}-powerpc32"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Zig ${ZIG_VERSION} — PowerPC 32-bit (iBook G3)" \
            --notes-file /tmp/release-notes.md \
            "${{ env.ARCHIVE }}"
