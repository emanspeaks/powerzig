name: Build Zig for PowerPC 32-bit

# Builds Zig for powerpc-linux-musleabihf (iBook G3 / 750fx) using zig-bootstrap from Codeberg.
# Uses musl (static linking, hard-float ABI) — Zig can provide libc for musleabihf but
# NOT for bare powerpc-linux-gnu or powerpc-linux-musl (ABI suffix required).
# The 750fx has a hardware FPU so the 'hf' suffix is correct.
#
# LLVM is NOT built here.  Pre-built LLVM artifacts are downloaded from the
# emanspeaks/powerzig-bootstrap repo at the tag pinned by LLVM_ARTIFACT_TAG below.
# When powerzig-bootstrap publishes a new LLVM release (v2, v3, …), update
# LLVM_ARTIFACT_TAG here and push — the version bump drives a fresh Zig build.
#
# Trigger behaviour:
#   push to any branch  → full build, no release (smoke-tests the workflow)
#   push of tag v*.*.*  → full build + GitHub Release (zig-bootstrap checked out at
#                         the matching version tag; v0.14.0 → zig-bootstrap 0.14.0)
#   schedule (weekly)   → full build + release, skipped if this version was released before
#   workflow_dispatch   → full build + release (force_rebuild overwrites an existing release)

on:
  push:
    branches: ['**']
    tags: ['v[0-9]*']
  schedule:
    - cron: '0 2 * * 0'   # Every Sunday at 02:00 UTC
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Rebuild and overwrite even if a release already exists'
        type: boolean
        required: false
        default: false

# Required to create/delete releases and their git tags.
permissions:
  contents: write

env:
  # ── LLVM artifact pin ──────────────────────────────────────────────────────
  # Release tag in emanspeaks/powerzig-bootstrap that provides the pre-built
  # LLVM artifacts used by this build.  Bump this when powerzig-bootstrap
  # publishes a new LLVM release; the version bump here triggers a Zig rebuild.
  LLVM_ARTIFACT_TAG:  v1
  LLVM_ARTIFACT_REPO: emanspeaks/powerzig-bootstrap
  # ── Cross-compilation target ───────────────────────────────────────────────
  # 32-bit big-endian PowerPC, musl, hard-float ABI.
  ZIG_TARGET: powerpc-linux-musleabihf
  # CPU baseline is safe for any 32-bit PPC including the 750fx (G3).
  # The 750fx has no AltiVec, so we must not use a cpu that enables it.
  ZIG_CPU:    baseline

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Clone zig-bootstrap, detect the Zig version it will build, and decide
  # whether to build and/or publish a release.
  # ─────────────────────────────────────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      zig_version:    ${{ steps.version.outputs.zig_version }}
      should_build:   ${{ steps.gate.outputs.should_build }}
      should_release: ${{ steps.gate.outputs.should_release }}
    steps:
      # For version-tag pushes (e.g. v0.14.0) check out zig-bootstrap at the
      # matching tag (0.14.0) so the build is pinned to that exact Zig release.
      # For all other triggers, use the main branch (latest commits).
      - name: Clone zig-bootstrap from Codeberg
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            BOOTSTRAP_REF="${{ github.ref_name }}"
            BOOTSTRAP_REF="${BOOTSTRAP_REF#v}"   # strip leading 'v': v0.14.0 → 0.14.0
            echo "Tag push — cloning zig-bootstrap at $BOOTSTRAP_REF"
            git clone --depth 1 --branch "$BOOTSTRAP_REF" \
              https://codeberg.org/ziglang/zig-bootstrap.git bootstrap 2>/dev/null || {
              echo "Tag $BOOTSTRAP_REF not found in zig-bootstrap; falling back to main"
              git clone --depth 1 https://codeberg.org/ziglang/zig-bootstrap.git bootstrap
            }
          else
            echo "Non-tag push — cloning zig-bootstrap main (latest commits)"
            git clone --depth 1 https://codeberg.org/ziglang/zig-bootstrap.git bootstrap
          fi
          echo "Cloned at commit: $(git -C bootstrap rev-parse --short HEAD)"

      - name: Detect Zig version from zig-bootstrap source
        id: version
        run: |
          cd bootstrap
          if [[ -f zig-version ]]; then
            V=$(tr -d '[:space:]' < zig-version)
          elif grep -q 'ZIG_VERSION' build 2>/dev/null; then
            V=$(grep -m1 'ZIG_VERSION' build | grep -oE '[0-9]+\.[0-9]+\.[0-9]+[^"'\''[:space:]]*')
          else
            # Fallback: date + short hash keeps release tags unique.
            V="nightly-$(git log -1 --format='%cd' --date=format:'%Y%m%d')-$(git rev-parse --short HEAD)"
          fi
          echo "zig_version=$V" >> "$GITHUB_OUTPUT"
          echo "Detected Zig version: $V"

      - name: Determine build and release gates
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EVENT="${{ github.event_name }}"
          REF_TYPE="${{ github.ref_type }}"
          FORCE="${{ inputs.force_rebuild }}"
          TAG="zig-${{ steps.version.outputs.zig_version }}-powerpc32"

          if [[ "$EVENT" == "push" ]]; then
            # Always build on push (verifies the workflow); never release on branch push.
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            if [[ "$REF_TYPE" == "tag" ]]; then
              echo "should_release=true"  >> "$GITHUB_OUTPUT"
              echo "Tag push — will build and release as $TAG"
            else
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "Branch push — will build but not release"
            fi
          else
            # Schedule or workflow_dispatch: skip if this version is already released.
            if [[ "$FORCE" == "true" ]]; then
              echo "should_build=true"   >> "$GITHUB_OUTPUT"
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "Force-rebuild — will build and release regardless"
            elif gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
              echo "should_build=false"   >> "$GITHUB_OUTPUT"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "Release $TAG already exists — skipping"
            else
              echo "should_build=true"   >> "$GITHUB_OUTPUT"
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "No existing release for $TAG — will build and release"
            fi
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Download pre-built LLVM from emanspeaks/powerzig-bootstrap and compile
  # only the Zig stage (~30 min instead of the 5-hour full build).
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 2-hour cap; Zig-only build is much faster than LLVM+Zig

    env:
      ZIG_VERSION: ${{ needs.prepare.outputs.zig_version }}

    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get install -y -qq xz-utils

      # Clone with --recurse-submodules to populate bootstrap/zig/ (the Zig source tree).
      # The build step runs `zig build` directly using the pre-built host Zig binary —
      # no cmake or LLVM compilation required.
      - name: Clone zig-bootstrap from Codeberg (with Zig source submodule)
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            BOOTSTRAP_REF="${{ github.ref_name }}"
            BOOTSTRAP_REF="${BOOTSTRAP_REF#v}"
            git clone --recurse-submodules --shallow-submodules --depth 1 \
              --branch "$BOOTSTRAP_REF" \
              https://codeberg.org/ziglang/zig-bootstrap.git bootstrap 2>/dev/null || \
            git clone --recurse-submodules --shallow-submodules --depth 1 \
              https://codeberg.org/ziglang/zig-bootstrap.git bootstrap
          else
            git clone --recurse-submodules --shallow-submodules --depth 1 \
              https://codeberg.org/ziglang/zig-bootstrap.git bootstrap
          fi
          echo "Cloned at commit: $(git -C bootstrap rev-parse --short HEAD)"
          if [[ ! -f bootstrap/zig/build.zig ]]; then
            echo "ERROR: bootstrap/zig/build.zig not found after --recurse-submodules."
            echo "zig-bootstrap may have changed its directory structure."
            exit 1
          fi
          echo "Zig source submodule: present"

      # Cache only the final Zig install (~150 MB).  Key includes LLVM_ARTIFACT_TAG so
      # that bumping the LLVM pin busts the cache and triggers a fresh Zig build.
      - name: Restore cached Zig binary
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: bootstrap/out/zig-${{ env.ZIG_TARGET }}-${{ env.ZIG_CPU }}
          key: zig-${{ env.ZIG_VERSION }}-${{ env.ZIG_TARGET }}-${{ env.ZIG_CPU }}-llvm${{ env.LLVM_ARTIFACT_TAG }}-v1

      - name: Download pre-built LLVM artifact
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          echo "Downloading LLVM artifacts from $LLVM_ARTIFACT_REPO @ $LLVM_ARTIFACT_TAG"
          gh release download "$LLVM_ARTIFACT_TAG" \
            --repo "$LLVM_ARTIFACT_REPO" \
            --pattern 'llvm-host-zig.tar.xz' \
            --pattern 'llvm-cross-powerpc32.tar.xz' \
            --dir /tmp/llvm-artifacts
          ls -lah /tmp/llvm-artifacts/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract LLVM artifact
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          mkdir -p bootstrap/out/host
          tar -xJf /tmp/llvm-artifacts/llvm-host-zig.tar.xz -C bootstrap/out/host

          tar -xJf /tmp/llvm-artifacts/llvm-cross-powerpc32.tar.xz -C bootstrap/out

          echo "Host Zig: $(file bootstrap/out/host/bin/zig)"
          N=$(ls bootstrap/out/$ZIG_TARGET-$ZIG_CPU/lib/*.a 2>/dev/null | wc -l)
          echo "Cross LLVM: $N static libs in bootstrap/out/$ZIG_TARGET-$ZIG_CPU/lib/"

      # Runs the final stage of what zig-bootstrap's ./build script would do, using
      # the same flags.  LLVM is already in place from the downloaded artifact.
      - name: Build Zig for PowerPC 32-bit
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          echo "=== Building Zig $ZIG_VERSION for $ZIG_TARGET (cpu=$ZIG_CPU) ==="
          ROOTDIR="$PWD/bootstrap"
          ZIG="$ROOTDIR/out/host/bin/zig"
          cd bootstrap/zig
          "$ZIG" build \
            --prefix "$ROOTDIR/out/zig-$ZIG_TARGET-$ZIG_CPU" \
            --search-prefix "$ROOTDIR/out/$ZIG_TARGET-$ZIG_CPU" \
            -Dflat \
            -Dstatic-llvm \
            -Doptimize=ReleaseFast \
            -Dstrip \
            -Dtarget="$ZIG_TARGET" \
            -Dcpu="$ZIG_CPU" \
            -Dversion-string="$ZIG_VERSION"

      - name: Verify build output
        run: |
          OUT_DIR="bootstrap/out/zig-$ZIG_TARGET-$ZIG_CPU"
          if [[ ! -f "$OUT_DIR/bin/zig" ]]; then
            echo "ERROR: expected zig binary not found at $OUT_DIR/bin/zig"
            echo "Contents of bootstrap/out:"
            find bootstrap/out -maxdepth 3 | sort
            exit 1
          fi
          echo "Build successful!"
          file "$OUT_DIR/bin/zig"
          ls -lah "$OUT_DIR/bin/zig"

      - name: Package release archive
        run: |
          SRC="bootstrap/out/zig-$ZIG_TARGET-$ZIG_CPU"
          DEST="zig-$ZIG_VERSION-powerpc"
          ARCHIVE="zig-linux-powerpc-$ZIG_VERSION.tar.xz"

          cp -r "$SRC" "$DEST"
          tar cJf "$ARCHIVE" "$DEST/"

          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          ls -lah "$ARCHIVE"

      # --cleanup-tag removes both the release and its git tag in one call.
      - name: Delete existing release (force-rebuild only)
        if: inputs.force_rebuild == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="zig-${ZIG_VERSION}-powerpc32"
          gh release delete "$TAG" \
            --repo "${{ github.repository }}" \
            --cleanup-tag \
            --yes 2>/dev/null || true

      # Write release notes line-by-line to avoid heredoc/YAML indentation conflicts.
      - name: Write release notes
        if: needs.prepare.outputs.should_release == 'true'
        run: |
          TAG="zig-${ZIG_VERSION}-powerpc32"
          REPO="${{ github.repository }}"
          NOTE=/tmp/release-notes.md
          echo "## Zig ${ZIG_VERSION} for PowerPC 32-bit"                                                          > "$NOTE"
          echo ""                                                                                                   >> "$NOTE"
          echo "Cross-compiled Zig targeting \`${ZIG_TARGET}\` (musl, hard-float), for the iBook G3 Snow Clamshell (750fx CPU)." >> "$NOTE"
          echo ""                                                                                                   >> "$NOTE"
          echo "### Download and install on iBook G3"                                                              >> "$NOTE"
          echo ""                                                                                                   >> "$NOTE"
          echo '```bash'                                                                                            >> "$NOTE"
          echo "wget https://github.com/${REPO}/releases/download/${TAG}/zig-linux-powerpc-${ZIG_VERSION}.tar.xz" >> "$NOTE"
          echo "tar xf zig-linux-powerpc-${ZIG_VERSION}.tar.xz"                                                   >> "$NOTE"
          echo "export PATH=\"\$PWD/zig-${ZIG_VERSION}-powerpc/bin:\$PATH\""                                      >> "$NOTE"
          echo "zig version"                                                                                        >> "$NOTE"
          echo '```'                                                                                                >> "$NOTE"
          echo ""                                                                                                   >> "$NOTE"
          echo "To make the PATH permanent, add the export line to your \`~/.bashrc\` or \`~/.profile\`."         >> "$NOTE"
          echo ""                                                                                                   >> "$NOTE"
          echo "### Build details"                                                                                  >> "$NOTE"
          echo ""                                                                                                   >> "$NOTE"
          echo "| Field | Value |"                                                                                  >> "$NOTE"
          echo "|---|---|"                                                                                          >> "$NOTE"
          echo "| Zig version | \`${ZIG_VERSION}\` |"                                                             >> "$NOTE"
          echo "| Target triple | \`${ZIG_TARGET}\` |"                                                            >> "$NOTE"
          echo "| CPU | \`${ZIG_CPU}\` (safe for 750fx — no AltiVec) |"                                          >> "$NOTE"
          echo "| libc | musl (statically linked — no runtime glibc dependency) |"                                >> "$NOTE"
          echo "| LLVM artifact | [\`${LLVM_ARTIFACT_TAG}\`](https://github.com/${LLVM_ARTIFACT_REPO}/releases/tag/${LLVM_ARTIFACT_TAG}) from \`${LLVM_ARTIFACT_REPO}\` |" >> "$NOTE"
          echo "| Built with | [zig-bootstrap](https://codeberg.org/ziglang/zig-bootstrap) on GitHub Actions |"   >> "$NOTE"
          echo "| Runner | ubuntu-latest (x86_64) |"                                                               >> "$NOTE"

      - name: Publish GitHub Release
        if: needs.prepare.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="zig-${ZIG_VERSION}-powerpc32"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Zig ${ZIG_VERSION} — PowerPC 32-bit (iBook G3)" \
            --notes-file /tmp/release-notes.md \
            "${{ env.ARCHIVE }}"
