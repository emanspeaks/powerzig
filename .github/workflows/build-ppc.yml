name: Build Zig for PowerPC 32-bit

# Builds Zig for powerpc-linux-musl (iBook G3 / 750fx) using zig-bootstrap from Codeberg.
# Static musl binary: no runtime dependencies, strict IEEE 754, portable across distros.
#
# Trigger behaviour:
#   push to any branch  → full build, no release (smoke-tests the workflow)
#   push of tag v*.*.*  → full build + GitHub Release (zig-bootstrap checked out at
#                         the matching version tag; v0.14.0 → zig-bootstrap 0.14.0)
#   schedule (weekly)   → full build + release, skipped if this version was released before
#   workflow_dispatch   → full build + release (force_rebuild overwrites an existing release)
#
# First run: 2–4 hours (LLVM compilation).
# Repeat runs where ZIG_VERSION is unchanged: ~30 min (LLVM output is cached).

on:
  push:
    branches: ['**']
    tags: ['v[0-9]*']
  schedule:
    - cron: '0 2 * * 0'   # Every Sunday at 02:00 UTC
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Rebuild and overwrite even if a release already exists'
        type: boolean
        required: false
        default: false

# Required to create/delete releases and their git tags.
permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Clone zig-bootstrap, detect the Zig version it will build, and decide
  # whether to build and/or publish a release.
  # ─────────────────────────────────────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      zig_version:   ${{ steps.version.outputs.zig_version }}
      should_build:  ${{ steps.gate.outputs.should_build }}
      should_release: ${{ steps.gate.outputs.should_release }}
    steps:
      # For version-tag pushes (e.g. v0.14.0) check out zig-bootstrap at the
      # matching tag (0.14.0) so the build is pinned to that exact Zig release.
      # For all other triggers, use the main branch (latest commits).
      - name: Clone zig-bootstrap from Codeberg
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            BOOTSTRAP_REF="${{ github.ref_name }}"
            BOOTSTRAP_REF="${BOOTSTRAP_REF#v}"   # strip leading 'v': v0.14.0 → 0.14.0
            echo "Tag push — cloning zig-bootstrap at $BOOTSTRAP_REF"
            git clone --depth 1 --branch "$BOOTSTRAP_REF" \
              https://codeberg.org/ziglang/zig-bootstrap.git bootstrap 2>/dev/null || {
              echo "Tag $BOOTSTRAP_REF not found in zig-bootstrap; falling back to main"
              git clone --depth 1 https://codeberg.org/ziglang/zig-bootstrap.git bootstrap
            }
          else
            echo "Non-tag push — cloning zig-bootstrap main (latest commits)"
            git clone --depth 1 https://codeberg.org/ziglang/zig-bootstrap.git bootstrap
          fi
          echo "Cloned at commit: $(git -C bootstrap rev-parse --short HEAD)"

      - name: Detect Zig version from zig-bootstrap source
        id: version
        run: |
          cd bootstrap
          if [[ -f zig-version ]]; then
            V=$(tr -d '[:space:]' < zig-version)
          elif grep -q 'ZIG_VERSION' build 2>/dev/null; then
            V=$(grep -m1 'ZIG_VERSION' build | grep -oE '[0-9]+\.[0-9]+\.[0-9]+[^"'\''[:space:]]*')
          else
            # Fallback: date + short hash keeps release tags unique.
            V="nightly-$(git log -1 --format='%cd' --date=format:'%Y%m%d')-$(git rev-parse --short HEAD)"
          fi
          echo "zig_version=$V" >> "$GITHUB_OUTPUT"
          echo "Detected Zig version: $V"

      - name: Determine build and release gates
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EVENT="${{ github.event_name }}"
          REF_TYPE="${{ github.ref_type }}"
          FORCE="${{ inputs.force_rebuild }}"
          TAG="zig-${{ steps.version.outputs.zig_version }}-powerpc32"

          if [[ "$EVENT" == "push" ]]; then
            # Always build on push (verifies the workflow); never release on branch push.
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            if [[ "$REF_TYPE" == "tag" ]]; then
              echo "should_release=true"  >> "$GITHUB_OUTPUT"
              echo "Tag push — will build and release as $TAG"
            else
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "Branch push — will build but not release"
            fi
          else
            # Schedule or workflow_dispatch: skip if this version is already released.
            if [[ "$FORCE" == "true" ]]; then
              echo "should_build=true"   >> "$GITHUB_OUTPUT"
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "Force-rebuild — will build and release regardless"
            elif gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
              echo "should_build=false"   >> "$GITHUB_OUTPUT"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "Release $TAG already exists — skipping"
            else
              echo "should_build=true"   >> "$GITHUB_OUTPUT"
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "No existing release for $TAG — will build and release"
            fi
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Cross-compile LLVM + Zig for powerpc-linux-gnu using zig-bootstrap.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6-hour hard cap (LLVM build can be long)

    env:
      ZIG_VERSION: ${{ needs.prepare.outputs.zig_version }}
      # Target triple: 32-bit big-endian PowerPC, musl libc (statically linked).
      # powerpc-linux-musl (no 'eabi' suffix) uses the standard ELF/SVR4 ABI with
      # hardware float — correct for the 750fx which has a real FPU.
      ZIG_TARGET:  powerpc-linux-musl
      # CPU baseline is safe for any 32-bit PPC including the 750fx (G3).
      # The 750fx has no AltiVec, so we must not use a cpu that enables it.
      ZIG_CPU:     baseline

    steps:
      # Free runners ship with a lot of pre-installed toolchains we don't need.
      # Reclaiming ~15 GB prevents out-of-disk failures during the LLVM build.
      - name: Free up runner disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /usr/local/.ghcup \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost
          sudo apt-get autoremove -y -qq
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get install -y -qq cmake ninja-build xz-utils python3

      # Clone zig-bootstrap using the same logic as the prepare job.
      - name: Clone zig-bootstrap from Codeberg
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            BOOTSTRAP_REF="${{ github.ref_name }}"
            BOOTSTRAP_REF="${BOOTSTRAP_REF#v}"
            git clone --depth 1 --branch "$BOOTSTRAP_REF" \
              https://codeberg.org/ziglang/zig-bootstrap.git bootstrap 2>/dev/null || \
            git clone --depth 1 https://codeberg.org/ziglang/zig-bootstrap.git bootstrap
          else
            git clone --depth 1 https://codeberg.org/ziglang/zig-bootstrap.git bootstrap
          fi
          echo "Cloned at commit: $(git -C bootstrap rev-parse --short HEAD)"

      # Cache the compiled LLVM output across workflow runs.
      # On a cache hit the build script skips the multi-hour LLVM compilation.
      - name: Restore cached LLVM output
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: bootstrap/out
          key: llvm-${{ env.ZIG_VERSION }}-${{ env.ZIG_TARGET }}-${{ env.ZIG_CPU }}-v2

      - name: Build LLVM + Zig for PowerPC 32-bit
        run: |
          cd bootstrap
          echo "=== Building Zig $ZIG_VERSION for $ZIG_TARGET (cpu=$ZIG_CPU) ==="
          if [[ "${{ steps.cache-llvm.outputs.cache-hit }}" == "true" ]]; then
            echo "LLVM cache hit — skipping LLVM compilation."
          else
            echo "No LLVM cache — this will take 2–4 hours."
          fi
          ./build "$ZIG_TARGET" "$ZIG_CPU"

      - name: Verify build output
        run: |
          OUT_DIR="bootstrap/out/zig-$ZIG_TARGET-$ZIG_CPU"
          if [[ ! -f "$OUT_DIR/bin/zig" ]]; then
            echo "ERROR: expected zig binary not found at $OUT_DIR/bin/zig"
            echo "Contents of bootstrap/out:"
            find bootstrap/out -maxdepth 3 | sort
            exit 1
          fi
          echo "Build successful!"
          file "$OUT_DIR/bin/zig"
          ls -lah "$OUT_DIR/bin/zig"

      - name: Package release archive
        run: |
          SRC="bootstrap/out/zig-$ZIG_TARGET-$ZIG_CPU"
          DEST="zig-$ZIG_VERSION-powerpc"
          ARCHIVE="zig-linux-powerpc-$ZIG_VERSION.tar.xz"

          cp -r "$SRC" "$DEST"
          tar cJf "$ARCHIVE" "$DEST/"

          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          ls -lah "$ARCHIVE"

      # --cleanup-tag removes both the release and its git tag in one call.
      - name: Delete existing release (force-rebuild only)
        if: inputs.force_rebuild == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="zig-${ZIG_VERSION}-powerpc32"
          gh release delete "$TAG" \
            --repo "${{ github.repository }}" \
            --cleanup-tag \
            --yes 2>/dev/null || true

      # Write release notes line-by-line to avoid heredoc/YAML indentation conflicts.
      - name: Write release notes
        if: needs.prepare.outputs.should_release == 'true'
        run: |
          TAG="zig-${ZIG_VERSION}-powerpc32"
          REPO="${{ github.repository }}"
          NOTE=/tmp/release-notes.md
          echo "## Zig ${ZIG_VERSION} for PowerPC 32-bit"                                                          > "$NOTE"
          echo ""                                                                                                   >> "$NOTE"
          echo "Cross-compiled Zig targeting \`${ZIG_TARGET}\`, for the iBook G3 Snow Clamshell (750fx CPU)."     >> "$NOTE"
          echo ""                                                                                                   >> "$NOTE"
          echo "### Download and install on iBook G3"                                                              >> "$NOTE"
          echo ""                                                                                                   >> "$NOTE"
          echo '```bash'                                                                                            >> "$NOTE"
          echo "wget https://github.com/${REPO}/releases/download/${TAG}/zig-linux-powerpc-${ZIG_VERSION}.tar.xz" >> "$NOTE"
          echo "tar xf zig-linux-powerpc-${ZIG_VERSION}.tar.xz"                                                   >> "$NOTE"
          echo "export PATH=\"\$PWD/zig-${ZIG_VERSION}-powerpc/bin:\$PATH\""                                      >> "$NOTE"
          echo "zig version"                                                                                        >> "$NOTE"
          echo '```'                                                                                                >> "$NOTE"
          echo ""                                                                                                   >> "$NOTE"
          echo "To make the PATH permanent, add the export line to your \`~/.bashrc\` or \`~/.profile\`."         >> "$NOTE"
          echo ""                                                                                                   >> "$NOTE"
          echo "### Build details"                                                                                  >> "$NOTE"
          echo ""                                                                                                   >> "$NOTE"
          echo "| Field | Value |"                                                                                  >> "$NOTE"
          echo "|---|---|"                                                                                          >> "$NOTE"
          echo "| Zig version | \`${ZIG_VERSION}\` |"                                                             >> "$NOTE"
          echo "| Target triple | \`${ZIG_TARGET}\` |"                                                            >> "$NOTE"
          echo "| CPU | \`${ZIG_CPU}\` (safe for 750fx — no AltiVec) |"                                          >> "$NOTE"
          echo "| libc | musl (statically linked — no runtime dependencies) |"                                     >> "$NOTE"
          echo "| Built with | [zig-bootstrap](https://codeberg.org/ziglang/zig-bootstrap) on GitHub Actions |"   >> "$NOTE"
          echo "| Runner | ubuntu-latest (x86_64) |"                                                               >> "$NOTE"

      - name: Publish GitHub Release
        if: needs.prepare.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="zig-${ZIG_VERSION}-powerpc32"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Zig ${ZIG_VERSION} — PowerPC 32-bit (iBook G3)" \
            --notes-file /tmp/release-notes.md \
            "${{ env.ARCHIVE }}"
